            - text: banner, I design platform engineering solutions for authentication, access control, data tracking, and SME enablement using TypeScript, Next.js, Python, Rust, and Supabase.
          - paragraph [ref=e82]: I support local small businesses like Yong’s SecurieCam and Ancestral Holistic Healing to build secure digital presence and operational systems.
          - paragraph [ref=e83]: My operational portfolio includes Buddies Worldwide, a P2P marketplace for South Africa's informal economy with integrated escrow and Paxi logistics; OpenClaw, an AI deployment arm powering local LLM orchestration; and The Vault, a hardware edge node initiative repurposing 5G outdoor CPE into resilient infrastructure.
